version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Dubai'
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      frontend-tooling:
        patterns:
          - 'vite'
          - '@vitejs/*'
          - 'tailwindcss'
          - 'postcss'
          - 'autoprefixer'
          - 'cssnano'
      test-tooling:
        patterns:
          - '@playwright/*'
          - 'playwright'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:30'
      timezone: 'Asia/Dubai'
    labels:
      - dependencies
