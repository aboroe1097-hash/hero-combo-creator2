name: CI

on:
  push:
  pull_request:

jobs:
  check-fast:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: dummy
      VITE_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: dummy
      VITE_FIREBASE_STORAGE_BUCKET: dummy.firebasestorage.app
      VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
      VITE_FIREBASE_APP_ID: 1:000000000000:web:dummy
      VITE_FIREBASE_MEASUREMENT_ID: G-DUMMY
      VITE_RECAPTCHA_SITE_KEY: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check:fast
