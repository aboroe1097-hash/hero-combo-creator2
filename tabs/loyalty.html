      <div class="loyalty-root">
        <header class="loyalty-header">
          <div>
            <h2 class="loyalty-title" data-i18n="loyaltyTitle">Loyalty Upgrade Calculator</h2>
            <p class="loyalty-desc" data-i18n="loyaltyDesc">Calculate processing times, poison percentages, and optimal upgrade paths.</p>
          </div>
          <button type="button" id="loyaltyOpenEdenBtn" class="loyalty-eden-link-btn" data-i18n-title="loyaltyOpenEdenTitle" title="Open Eden Map planner">
            <svg class="eden-inline-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3V6z"/><path d="M9 3v15"/><path d="M15 6v15"/></svg>
            <span data-i18n="loyaltyOpenEden">Eden Map</span>
          </button>
        </header>

        <div class="loyalty-layout">
          <div class="loyalty-main">
            <div id="loyaltyPresets" class="loyalty-presets" role="group" aria-label="Loyalty presets"></div>
            <div class="loyalty-inputs">
        <div class="loyalty-panel">
          <h3 class="loyalty-panel-title" data-i18n="campLevelsTitle">Coalition Base Camp Levels</h3>
          
          <div class="loyalty-media-row">
            <div class="loyalty-camp-media">
              <img src="images/ac_camp.jpg" alt="Coalition Camps" class="loyalty-panel-image loyalty-panel-image--camp">
            </div>
            
            <div class="loyalty-camp-fields">
              <label class="loyalty-level-row">
                <span class="loyalty-level-label" data-i18n="camp1">Camp I Level</span>
                <input type="number" id="ac1Level" min="0" max="20" value="20" class="loyalty-input loyalty-input--small">
              </label>
              <label class="loyalty-level-row">
                <span class="loyalty-level-label" data-i18n="camp2">Camp II Level</span>
                <input type="number" id="ac2Level" min="0" max="20" value="16" class="loyalty-input loyalty-input--small">
              </label>
              <label class="loyalty-level-row">
                <span class="loyalty-level-label" data-i18n="camp3">Camp III Level</span>
                <input type="number" id="ac3Level" min="0" max="20" value="12" class="loyalty-input loyalty-input--small">
              </label>
              <label class="loyalty-level-row">
                <span class="loyalty-level-label" data-i18n="camp4">Camp IV Level</span>
                <input type="number" id="ac4Level" min="0" max="20" value="10" class="loyalty-input loyalty-input--small">
              </label>
            </div>
          </div>
        </div>

        <div class="loyalty-panel">
          <h3 class="loyalty-panel-title" data-i18n="dailyProdTitle">Daily Production Sources (Units/Hour)</h3>
          
          <div class="loyalty-stack loyalty-stack--loose">
            <div class="loyalty-media-row loyalty-media-row--compact">
              <div class="loyalty-source-media">
                <img src="images/prod_1_3.jpg" alt="Sources 1 to 3" class="loyalty-panel-image">
              </div>
              <div class="loyalty-source-grid">
                <label class="loyalty-source-tile">
                  <span class="loyalty-source-label" data-i18n="source1">Source 1</span>
                  <input type="number" id="source1" value="1830" class="loyalty-input loyalty-input--tile">
                </label>
                <label class="loyalty-source-tile">
                  <span class="loyalty-source-label" data-i18n="source2">Source 2</span>
                  <input type="number" id="source2" value="64999" class="loyalty-input loyalty-input--tile">
                </label>
                <label class="loyalty-source-tile">
                  <span class="loyalty-source-label" data-i18n="source3">Source 3</span>
                  <input type="number" id="source3" value="78801" class="loyalty-input loyalty-input--tile">
                </label>
              </div>
            </div>

            <div class="loyalty-divider"></div>

            <div class="loyalty-media-row loyalty-media-row--compact">
              <div class="loyalty-source-media">
                <img src="images/prod_4_6.jpg" alt="Sources 4 to 6" class="loyalty-panel-image">
              </div>
              <div class="loyalty-source-grid">
                <label class="loyalty-source-tile">
                  <span class="loyalty-source-label" data-i18n="source4">Source 4</span>
                  <input type="number" id="source4" value="4855" class="loyalty-input loyalty-input--tile">
                </label>
                <label class="loyalty-source-tile">
                  <span class="loyalty-source-label" data-i18n="source5">Source 5</span>
                  <input type="number" id="source5" value="1560" class="loyalty-input loyalty-input--tile">
                </label>
                <label class="loyalty-source-tile">
                  <span class="loyalty-source-label" data-i18n="source6">Source 6</span>
                  <input type="number" id="source6" value="1560" class="loyalty-input loyalty-input--tile">
                </label>
              </div>
            </div>
          </div>
        </div>
        
        <div class="loyalty-panel">
          <h3 class="loyalty-panel-title" data-i18n="modifiersTitle">Modifiers</h3>
          <div class="loyalty-stack">
            <label class="loyalty-feature-card loyalty-feature-card--purple">
              <div class="loyalty-feature-media loyalty-feature-media--wide">
                <img src="images/bonus_loyalty.png" alt="Bonus Loyalty" class="loyalty-feature-image">
              </div>
              <div class="loyalty-feature-body loyalty-feature-body--narrow">
                <div class="loyalty-feature-copy">
                  <span class="loyalty-field-label" data-i18n="bonusLoyalty">Bonus Loyalty</span>
                  <span class="loyalty-field-sub" data-i18n="bonusLoyaltyDesc">1 Tech Point = 60 Loyalty</span>
                </div>
                <input type="number" id="bonusPoints" min="0" value="20" max="20" class="loyalty-input loyalty-input--full">
              </div>
            </label>

            <label class="loyalty-feature-card loyalty-feature-card--amber">
              <div class="loyalty-feature-media loyalty-feature-media--narrow">
                <img src="images/saved_units.png" alt="Saved Units" class="loyalty-feature-image">
              </div>
              <div class="loyalty-feature-body loyalty-feature-body--wide">
                <div class="loyalty-feature-copy">
                  <span class="loyalty-field-label" data-i18n="savedUnits">Saved Units</span>
                  <span class="loyalty-field-sub" data-i18n="savedUnitsDesc">Current inventory</span>
                </div>
                <input type="number" id="savedUnits" min="0" value="2340016" class="loyalty-input loyalty-input--full">
              </div>
            </label>
          </div>
        </div>

        <div class="loyalty-panel">
          <h3 class="loyalty-panel-title" data-i18n="processingTitle">Processing Settings</h3>
          
          <div class="loyalty-stack">
            <div class="loyalty-feature-card loyalty-feature-card--sky">
              <div class="loyalty-feature-media loyalty-feature-media--wide">
                <img src="images/processing_time.jpg" alt="Processing Time" class="loyalty-feature-image loyalty-feature-image--tall">
              </div>
              
              <div class="loyalty-feature-body loyalty-feature-body--narrow loyalty-feature-body--roomy">
                <label class="loyalty-field">
                  <span class="loyalty-field-label loyalty-field-label--small" data-i18n="unitsPerPatch">Units per patch</span>
                  <input type="number" id="totalUnitsPerPatch" value="568000" class="loyalty-input loyalty-input--full">
                </label>
                
                <div class="loyalty-field">
                  <span class="loyalty-field-label loyalty-field-label--small" data-i18n="timePerPatch">Time per patch</span>
                  <div class="loyalty-time-row">
                    <div class="loyalty-time-field">
                      <input type="number" id="processingHours" min="0" value="8" class="loyalty-input loyalty-input--time">
                      <span class="loyalty-time-unit">h</span>
                    </div>
                    <div class="loyalty-time-field">
                      <input type="number" id="processingMinutes" min="0" max="59" value="2" class="loyalty-input loyalty-input--time">
                      <span class="loyalty-time-unit">m</span>
                    </div>
                    <div class="loyalty-time-field">
                      <input type="number" id="processingSeconds" min="0" max="59" value="48" class="loyalty-input loyalty-input--time">
                      <span class="loyalty-time-unit">s</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <label class="loyalty-feature-card loyalty-feature-card--sky">
              <div class="loyalty-feature-media loyalty-feature-media--wide">
                <img src="images/patches.jpg" alt="Active Patches" class="loyalty-feature-image">
              </div>
              
              <div class="loyalty-feature-body loyalty-feature-body--narrow">
                <div class="loyalty-feature-copy">
                  <span class="loyalty-field-label" data-i18n="activePatches">Active Patches</span>
                  <span class="loyalty-field-sub" data-i18n="activePatchesDesc">Currently running workshops</span>
                </div>
                <input type="number" id="numPatches" value="3" class="loyalty-input loyalty-input--full">
              </div>
            </label>
          </div>
        </div>
            </div>
          </div>

          <aside class="loyalty-aside">
            <div id="loyaltyStickySummary" class="loyalty-sticky"></div>
          </aside>
        </div>

        <div id="loyaltyResult" class="loyalty-results"></div>
      </div>
